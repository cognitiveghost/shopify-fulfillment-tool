name: Test, Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]

jobs:
  verify:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check . || true
      - name: Smoke test (headless import + construct MainWindow)
        timeout-minutes: 2
        run: CI=1 python run_dev.py
      - name: Run tests (auto-enables once tests/ exists again)
        run: if [ -d tests ]; then python -m pytest; fi

  build:
    name: Build Executable
    needs: [verify]
    runs-on: windows-latest
    # Only run build job for releases, not on every push/pr
    if: github.event_name == 'release'

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # PyInstaller is in dev requirements
          pip install -r requirements-dev.txt
      - name: Build executable with PyInstaller
        run: pyinstaller --onefile --windowed gui_main.py
      - name: Rename executable
        shell: bash
        run: mv dist/gui_main.exe "dist/ShopifyFulfillmentTool-v${{ github.ref_name }}.exe"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ShopifyFulfillmentTool-v${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
